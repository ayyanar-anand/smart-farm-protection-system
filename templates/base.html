<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Smart Farm Protection System — Real-time IoT dashboard for animal and bird detection using ESP32 sensors.">
    <title>{% block title %}Smart Farm Protection{% endblock %}</title>

    <!-- Google Font — Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>

    <!-- App stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>

<!-- ========== FLOATING PARTICLES CANVAS ========== -->
<canvas id="particleCanvas"></canvas>

<!-- ========== CURSOR GLOW LIGHT ========== -->
<div class="cursor-glow" id="cursorGlow"></div>

<!-- ========== NAVBAR ========== -->
<nav class="navbar">
    <div class="navbar__brand">
        <span class="icon">🌾</span>
        Smart Farm Protection System
    </div>

    <!-- Live badge -->
    <span class="live-badge"><span class="dot"></span> Live</span>

    <!-- Device name -->
    <span class="navbar__device">farm_unit_01</span>

    <!-- Mobile menu toggle -->
    <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">☰</button>

    <!-- Nav links -->
    <ul class="navbar__links" id="navLinks">
        <li><a href="/" class="{% if request.path == '/' %}active{% endif %}">Dashboard</a></li>
        <li><a href="/history" class="{% if request.path == '/history' %}active{% endif %}">History</a></li>
        <li><a href="/sessions" class="{% if request.path == '/sessions' %}active{% endif %}">Sessions</a></li>
        <li><a href="/stats" class="{% if request.path == '/stats' %}active{% endif %}">Analytics</a></li>
    </ul>
</nav>

<!-- ========== PAGE CONTENT ========== -->
<main class="container">
    {% block content %}{% endblock %}
</main>

<!-- ========== GLOBAL INTERACTIVE SCRIPTS ========== -->
<script>
/**
 * ============================================================
 *  PREMIUM INTERACTIVE EFFECTS
 *  1. Floating particle system (stars / fireflies)
 *  2. Cursor-following glow light
 *  3. Button ripple effect on click
 *  4. Card tilt on mouse move (3D perspective)
 *  5. Mobile nav toggle
 * ============================================================
 */

// ── 1. FLOATING PARTICLE SYSTEM ──────────────────────────────
(function () {
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    const PARTICLE_COUNT = 60;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    class Particle {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2.2 + 0.5;
            this.speedX = (Math.random() - 0.5) * 0.4;
            this.speedY = (Math.random() - 0.5) * 0.3;
            this.opacity = Math.random() * 0.5 + 0.1;
            this.pulse = Math.random() * Math.PI * 2;
            this.pulseSpeed = Math.random() * 0.02 + 0.005;
            // Random color between cyan, green, purple
            const colors = [
                [6, 182, 212],   // cyan
                [22, 163, 74],   // green
                [139, 92, 246],  // purple
                [245, 158, 11],  // amber
            ];
            this.color = colors[Math.floor(Math.random() * colors.length)];
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.pulse += this.pulseSpeed;
            // Wrap around screen
            if (this.x < -10) this.x = canvas.width + 10;
            if (this.x > canvas.width + 10) this.x = -10;
            if (this.y < -10) this.y = canvas.height + 10;
            if (this.y > canvas.height + 10) this.y = -10;
        }
        draw() {
            const glow = Math.sin(this.pulse) * 0.3 + 0.7;
            const alpha = this.opacity * glow;
            const [r, g, b] = this.color;
            // Outer glow
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size * 4, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${r},${g},${b},${alpha * 0.08})`;
            ctx.fill();
            // Core dot
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
            ctx.fill();
        }
    }

    for (let i = 0; i < PARTICLE_COUNT; i++) {
        particles.push(new Particle());
    }

    // Draw connection lines between nearby particles
    function drawConnections() {
        for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
                const dx = particles[i].x - particles[j].x;
                const dy = particles[i].y - particles[j].y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 120) {
                    const alpha = (1 - dist / 120) * 0.08;
                    ctx.beginPath();
                    ctx.moveTo(particles[i].x, particles[i].y);
                    ctx.lineTo(particles[j].x, particles[j].y);
                    ctx.strokeStyle = `rgba(6,182,212,${alpha})`;
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                }
            }
        }
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        drawConnections();
        requestAnimationFrame(animate);
    }
    animate();
})();

// ── 2. CURSOR-FOLLOWING GLOW LIGHT ──────────────────────────
(function () {
    const glow = document.getElementById('cursorGlow');
    let mouseX = -200, mouseY = -200;
    let glowX = -200, glowY = -200;

    document.addEventListener('mousemove', function (e) {
        mouseX = e.clientX;
        mouseY = e.clientY;
    });

    document.addEventListener('mouseleave', function () {
        mouseX = -200;
        mouseY = -200;
    });

    function updateGlow() {
        // Smooth follow with lerp
        glowX += (mouseX - glowX) * 0.12;
        glowY += (mouseY - glowY) * 0.12;
        glow.style.left = glowX + 'px';
        glow.style.top = glowY + 'px';
        requestAnimationFrame(updateGlow);
    }
    updateGlow();
})();

// ── 3. BUTTON RIPPLE EFFECT ON CLICK ────────────────────────
(function () {
    document.addEventListener('click', function (e) {
        const btn = e.target.closest('.btn, .navbar__links a');
        if (!btn) return;

        // Create ripple element
        const ripple = document.createElement('span');
        ripple.classList.add('ripple-effect');
        const rect = btn.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height) * 2;
        ripple.style.width = ripple.style.height = size + 'px';
        ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
        ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';

        btn.style.position = 'relative';
        btn.style.overflow = 'hidden';
        btn.appendChild(ripple);

        ripple.addEventListener('animationend', function () {
            ripple.remove();
        });
    });
})();

// ── 4. CARD 3D TILT ON MOUSE MOVE ──────────────────────────
(function () {
    const cards = document.querySelectorAll('.stat-card, .session-card, .counter-card, .avg-card');
    cards.forEach(function (card) {
        card.addEventListener('mousemove', function (e) {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            const rotateX = ((y - centerY) / centerY) * -6;
            const rotateY = ((x - centerX) / centerX) * 6;
            card.style.transform = 'perspective(600px) rotateX(' + rotateX + 'deg) rotateY(' + rotateY + 'deg) scale(1.03)';
        });
        card.addEventListener('mouseleave', function () {
            card.style.transform = 'perspective(600px) rotateX(0deg) rotateY(0deg) scale(1)';
        });
    });
})();

// ── 5. MOBILE NAV TOGGLE ────────────────────────────────────
document.getElementById('navToggle').addEventListener('click', function () {
    document.getElementById('navLinks').classList.toggle('open');
});
</script>

<!-- ========== PAGE-SPECIFIC SCRIPTS ========== -->
{% block scripts %}{% endblock %}

</body>
</html>
